name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build WordyDesk
        run: swift build --package-path apps/wordydesk

      - name: Validate Second Brain OS projects
        run: python3 second-brain-os/agents/scripts/validate_project.py
